<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fiorella B'Pizzas — Menú y pedidos por WhatsApp">
  <meta name="theme-color" content="#0e0302">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Fiorella B'Pizzas — Menú</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">
        <h1>Fiorella <em>B'Pizzas</em></h1>
      </div>
      <div class="header-branch-badge">
        📍 <span id="headerBranchName">—</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="change-branch-btn" onclick="changeBranch()">Cambiar sucursal</button>
      <button class="cart-btn" onclick="openCart()" aria-label="Ver pedido">
        🛒 Mi pedido
        <span class="cart-badge" id="cartBadge" aria-live="polite">0</span>
      </button>
    </div>
  </div>
</header>

<!-- ══ MINI HERO ══ -->
<div class="menu-hero">
  <h2>¿Qué se te <span>antoja</span> hoy?</h2>
  <p>Elige tus productos y te enviamos el pedido a WhatsApp</p>
</div>

<!-- ══ LAYOUT ══ -->
<div class="menu-layout">

  <!-- CATEGORY NAV -->
  <nav class="cat-nav" id="catNav" aria-label="Categorías del menú">
    <span class="cat-nav-title">Menú</span>
    <!-- Rendered by menu.js -->
  </nav>

  <!-- MENU SECTIONS -->
  <main id="menuSection" aria-label="Menú">
    <!-- Rendered by menu.js -->
  </main>

</div>

<!-- ══ MODAL — Extras al agregar ══ -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalProductName">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-product-info">
        <div class="modal-product-name" id="modalProductName"></div>
        <div class="modal-product-price" id="modalProductPrice"></div>
      </div>
      <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">✕</button>
    </div>

    <div class="modal-body" id="modalBody">
      <!-- Rendered dynamically -->
    </div>

    <div class="modal-footer">
      <div class="modal-total">
        <small>Total</small>
        <span id="modalTotal">$0.00</span>
      </div>
      <button class="modal-confirm-btn" onclick="modalConfirm()">
        Agregar al pedido
      </button>
    </div>
  </div>
</div>

<!-- ══ CART OVERLAY & PANEL ══ -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<aside class="cart-panel" id="cartPanel" aria-label="Tu pedido">
  <div class="cart-head">
    <div class="cart-head">
  <div class="cart-drag-handle"></div>
    <h2>Tu pedido</h2>
    <button class="cart-close" onclick="closeCart()" aria-label="Cerrar pedido">✕</button>
  </div>

  <div class="cart-branch-info">
    📍 Sucursal <strong id="cartBranchName">—</strong>
  </div>

  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <div class="empty-icon">🍽️</div>
      <p>Tu pedido está vacío.<br>¡Elige algo delicioso!</p>
    </div>
  </div>

  <div class="cart-foot">
    <div class="total-block">
      <div class="total-row">
        <span class="total-label">Total estimado</span>
        <span class="total-amount" id="cartTotal">$0.00</span>
      </div>
      <p class="total-sub" id="cartSub">0 productos</p>
    </div>
<div class="field">
  <label>Tipo de pedido</label>
  <div class="order-type-selector">
    <button class="order-type-btn active" id="btnPickup" onclick="selectOrderType('pickup')">
      🏪 Pick-up
    </button>
    <button class="order-type-btn" id="btnDelivery" onclick="selectOrderType('delivery')">
      🛵 Delivery
    </button>
  </div>
</div>
    <div class="field">
  <label for="custName">Nombre completo</label>
  <input type="text" id="custName" placeholder="Ej: Carlos Pérez" autocomplete="given-name">
</div>

<div class="field">
  <label for="custId">Cédula de identidad</label>
  <input type="text" id="custId" placeholder="Ej: V-12.345.678" inputmode="numeric">
</div>

<div class="field">
  <label for="custNotes">Notas adicionales (opcional)</label>
  <textarea id="custNotes" rows="2" placeholder="Ej: Sin cebolla, dirección de entrega…"></textarea>
</div>

    <button class="wa-btn" id="waSendBtn" onclick="sendWA()" disabled>
      <!-- WhatsApp SVG icon -->
      <svg class="wa-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar pedido por WhatsApp
    </button>

    <p class="disclaimer">
      Serás redirigido a WhatsApp con tu pedido listo.<br>¡Buen provecho!
    </p>
  </div>
</aside>

<!-- DATA + LOGIC -->
<script src="js/data.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
